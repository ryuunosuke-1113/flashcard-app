services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: flashcard-app
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        depends_on:
            db:
                condition: service_healthy

    web:
        image: nginx:1.27-alpine
        container_name: flashcard-web
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    db:
        image: mysql:8.4
        container_name: flashcard-db
        environment:
            MYSQL_DATABASE: flashcard
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: flashcard_user
            MYSQL_PASSWORD: flashcard_password
        volumes:
            - flashcard-db-data:/var/lib/mysql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "mysqladmin ping -h localhost -uroot -proot --silent",
                ]
            interval: 5s
            timeout: 5s
            retries: 20

volumes:
    flashcard-db-data:
